# ========== 新增白名单配置 ==========
whitelist:
  # API 路径白名单（不需要认证的接口）
  paths:
    - /api/v1/**
    - /api/health
    - /doc.html
    - /webjars/**
  
  # IP 白名单（限制访问的IP）
  ip:
    enabled: true  # 是否启用IP白名单
    list:
      - 127.0.0.1
      # 添加你需要允许的IP地址


logging:
  level:
    root: INFO
    com.sinotrans: DEBUG
  file:
    name: logs/sinotrans-blankbill.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
